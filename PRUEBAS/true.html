<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera Página Web. by Sebas :P</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef2f3; /* Color de fondo de la pantalla */
            color: #333333;
            text-align: center;
            padding: 40px;
        }
        .tarjeta {
            background-color: #ffffff; /* Color de la tarjeta blanca */
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Sombreado */
            max-width: 500px;
            margin: 0 auto; /* Para centrar la tarjeta */
        }
        h1 {
            color: #007BFF; /* Color azul para el título */
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #0056b3; /* Se oscurece al pasar el ratón */
        }
    </style>
</head>
<body>

    <div class="tarjeta">
        <h1>¡Hola, puto! 🌍</h1>
        <p>Esta es mi primera página web de prueba. Estoy aprendiendo a usar código.</p>
        
        <p>Cosas que puedo hacer con HTML:</p>
        <ul style="text-align: left;">
            <li>Escribir textos increíbles.</li>
            <li>Ponerle colores bonitos a la pantalla.</li>
            <li>Agregar botones que funcionen.</li>
        </ul>

        <button onclick="alert('¡Felicidades! Ya eres oficialmente un creador de páginas web. 🚀')">
            ¡Haz clic aquí!
        </button>
