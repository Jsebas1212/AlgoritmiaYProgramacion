<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Prueba</title>
    <style>
        /* Estilos generales de la página */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Diseño del marco de la calculadora */
        .calculadora {
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            width: 260px;
        }

        /* Diseño de la pantalla donde salen los números */
        #pantalla {
            width: 100%;
            height: 50px;
            background-color: #1e1e1e;
            border: none;
            border-radius: 8px;
            color: #00ffcc; /* Un color verde neón para los números */
            font-size: 28px;
            text-align: right;
            margin-bottom: 15px;
            padding: 5px 10px;
            box-sizing: border-box;
        }

        /* Cuadrícula para acomodar los botones */
        .botones {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        /* Diseño de los botones */
        button {
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #3e3e3e;
            color: white;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #555555;
        }

        /* Colores especiales para ciertos botones */
        .operador { background-color: #ff9800; }
        .operador:hover { background-color: #e68a00; }
        .igual { background-color: #00cc99; color: black; grid-column: span 2; }
        .igual:hover { background-color: #00b386; }
        .limpiar { background-color: #ff4c4c; grid-column: span 2; }
        .limpiar:hover { background-color: #e60000; }
    </style>
</head>
<body>

    <div class="calculadora">
        <input type="text" id="pantalla" disabled>

        <div class="botones">
            <button class="limpiar" onclick="limpiarPantalla()">C (Borrar)</button>
            <button class="operador" onclick="agregarValor('/')">/</button>
            <button class="operador" onclick="agregarValor('*')">X</button>

            <button onclick="agregarValor('7')">7</button>
            <button onclick="agregarValor('8')">8</button>
            <button onclick="agregarValor('9')">9</button>
            <button class="operador" onclick="agregarValor('-')">-</button>

            <button onclick="agregarValor('4')">4</button>
            <button onclick="agregarValor('5')">5</button>
            <button onclick="agregarValor('6')">6</button>
            <button class="operador" onclick="agregarValor('+')">+</button>

            <button onclick="agregarValor('1')">1</button>
            <button onclick="agregarValor('2')">2</button>
            <button onclick="agregarValor('3')">3</button>
            
            <button onclick="agregarValor('0')">0</button>
            <button onclick="agregarValor('.')">.</button>
            <button class="igual" onclick="calcular()">=</button>
        </div>
    </div>

    <script>
        // Función para ir agregando números y símbolos a la pantalla
        function agregarValor(valor) {
            document.getElementById('pantalla').value += valor;
        }

        // Función para borrar todo
        function limpiarPantalla() {
            document.getElementById('pantalla').value = '';
        }

        // Función para calcular el resultado final
        function calcular() {
            try {
                let operacion = document.getElementById('pantalla').value;
                // La función eval() hace las matemáticas automáticamente
                let resultado = eval(operacion); 
                document.getElementById('pantalla').value = resultado;
            } catch (error) {
                // Si el usuario escribe algo raro como "++", da error
                document.getElementById('pantalla').value = 'Error'; 
            }
        }
    </script>

</body>
</html>
